<!DOCTYPE html>
<html>
<head>
  <title>AI Transcriber</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
    .card { background: #1e1e1e; padding: 30px; border-radius: 12px; border: 1px solid #333; display: inline-block; width: 400px; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #4285f4; color: white; border: none; border-radius: 5px; margin-top: 20px; font-weight: bold; width: 100%; }
    #status { color: #fb8c00; margin-top: 15px; }
    progress { width: 100%; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AI Meet Transcriber</h1>
    <p id="status">Initializing AI...</p>
    <progress id="download-progress" value="0" max="100"></progress>
    <button id="authBtn" style="display:none;">START RECORDING</button>
  </div>
  <script type="module" src="options.js"></script>
</body>
</html>
