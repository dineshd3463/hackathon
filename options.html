<!DOCTYPE html>
<html>
<head>
  <title>AI Transcriber</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      text-align: center; 
      padding: 50px; 
      background: #0f0f0f; 
      color: #e0e0e0; 
      margin: 0;
    }
    .card { 
      background: #1e1e1e; 
      padding: 40px; 
      border-radius: 16px; 
      border: 1px solid #333; 
      display: inline-block; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      max-width: 450px;
      width: 90%;
    }
    h1 { color: #4285f4; margin-bottom: 10px; }
    p { color: #aaa; line-height: 1.5; }
    
    button { 
      padding: 16px 32px; 
      font-size: 18px; 
      cursor: pointer; 
      background: #4285f4; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      margin-top: 25px; 
      font-weight: bold; 
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #357ae8; }
    button:active { transform: scale(0.98); }
    
    #status { 
      margin-top: 20px; 
      font-size: 14px; 
      font-weight: 500;
      color: #fb8c00; /* Amber for loading */
    }
    
    /* Live transcript area */
    #transcript-preview {
      margin-top: 30px;
      padding: 15px;
      background: #121212;
      border-radius: 8px;
      border: 1px dashed #444;
      font-size: 13px;
      text-align: left;
      max-height: 150px;
      overflow-y: auto;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AI Transcriber</h1>
    <p>This extension runs <b>Whisper AI</b> locally in your browser. No data is sent to a server.</p>
    
    <div id="status">Initializing AI Engine...</div>
    
    <button id="authBtn" style="display:none;">START TRANSCRIPTION</button>
    
    <div id="transcript-preview">
      <strong style="color: #4285f4;">Live Stream:</strong>
      <div id="live-text" style="margin-top: 5px;"></div>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
